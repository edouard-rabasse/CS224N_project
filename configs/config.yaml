# =============================================================================
# Root Hydra Configuration
# Project: GNN-Syntax-BERT
# =============================================================================
# Usage:
#   uv run python src/train.py --config-name config
#   uv run python src/train.py --config-name config experiment=stop_grad
#   uv run python src/train.py --config-name config model/gnn=gnn gnn.conv_type=gcn

defaults:
  - model@model.bert: bert
  - model@model.gnn: gnn
  - model@model.alignment: alignment
  - experiment: multi_loss
  - _self_

# ---- Training ----
training:
  seed: 42
  num_train_epochs: 1
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 256
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4     # separate LR for GNN branch
  max_seq_length: 32
  warmup_steps: 0
  weight_decay: 0.0
  fp16: true
  output_dir: outputs/${experiment_name}
  logging_steps: 100
  eval_steps: 250
  save_steps: 250
  save_total_limit: 2
  gradient_accumulation_steps: 1
  dataloader_num_workers: 4

# ---- Data ----
data:
  train_file: data/wiki1m_for_simcse.txt
  parsed_graphs_dir: data/parsed_graphs
  max_train_samples: null     # null = use all, set integer to subsample
  preprocessing_num_workers: 8

