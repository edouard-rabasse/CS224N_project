# =============================================================================
# Ablation: GNN auxiliary loss disabled (μ = 0)
# =============================================================================
# Removes L_GNN from the objective; the GNN is only trained through
# the alignment loss. Tests whether the GNN auxiliary contrastive loss
# is necessary for good syntactic representations.
#
# Usage:  uv run python src/train.py experiment=ablation/mu_zero

experiment_name: ablation_mu_zero

model:
  gnn:
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.0
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
