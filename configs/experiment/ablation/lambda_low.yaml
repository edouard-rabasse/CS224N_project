# @package _global_
# =============================================================================
# Ablation: Alignment loss weight — low (λ = 0.01)
# =============================================================================
# Tests sensitivity to weak alignment pressure. At λ=0.01 the alignment
# signal barely perturbs the SimCSE objective; BERT may not internalize syntax.
#
# Usage:  uv run python src/train.py experiment=ablation/lambda_low

experiment_name: ablation_lambda_low

model:
  gnn:
    freeze: false
  alignment:
    lambda_align: 0.01
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 1
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
