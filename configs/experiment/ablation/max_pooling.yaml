# @package _global_
# =============================================================================
# Ablation: GNN graph-readout — max pooling
# =============================================================================
# Replaces mean-pool graph readout with element-wise max-pooling.
# Max pooling emphasises the most salient node (word) feature per dimension,
# which may capture syntactically important heads better than mean pooling.
#
# Usage:  uv run python src/train.py experiment=ablation/max_pooling

experiment_name: ablation_max_pooling

model:
  gnn:
    conv_type: gat
    pooling: max
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
