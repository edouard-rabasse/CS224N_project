# =============================================================================
# Ablation: GNN depth — 1 layer
# =============================================================================
# Tests whether a single message-passing step is sufficient to capture
# local syntactic structure (e.g., direct dependency arcs).
#
# Usage:  uv run python src/train.py experiment=ablation/gnn_1layer

experiment_name: ablation_gnn_1layer

model:
  gnn:
    conv_type: gat
    num_layers: 1
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
