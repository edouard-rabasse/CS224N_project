# =============================================================================
# Ablation: GNN graph-readout — CLS node pooling
# =============================================================================
# Uses the root-node (CLS node = dependency root) embedding as the graph-level
# representation instead of aggregating all nodes. Mirrors BERT's [CLS] token
# convention; the syntactic root is linguistically the most important word.
#
# Usage:  uv run python src/train.py experiment=ablation/cls_pooling

experiment_name: ablation_cls_pooling

model:
  gnn:
    conv_type: gat
    pooling: cls_node
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
