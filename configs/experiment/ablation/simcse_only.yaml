# @package _global_
# =============================================================================
# Ablation: SimCSE-only baseline (λ=0, μ=0)
# =============================================================================
# Only L_SimCSE is used. No GNN training, no alignment loss.
# This is the baseline to verify the training pipeline.

experiment_name: ablation_simcse_only

model:
  gnn:
    freeze: true
  alignment:
    lambda_align: 0.0
    mu_gnn: 0.0
    stop_grad_gnn: false

training:
  num_train_epochs: 1
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
