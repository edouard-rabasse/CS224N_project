# =============================================================================
# Ablation: GCN instead of GAT
# =============================================================================
# Baseline comparison: replace graph attention convolution with standard GCN.
# All other hyperparameters match the multi_loss default.
#
# Usage:  uv run python src/train.py experiment=ablation/gcn

experiment_name: ablation_gcn

model:
  gnn:
    conv_type: gcn
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
