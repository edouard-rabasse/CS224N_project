# @package _global_
# =============================================================================
# Ablation: GNN auxiliary loss weight — high (μ = 0.2)
# =============================================================================
# Stronger GNN auxiliary contrastive objective. Tests whether a better-trained
# GNN (via its own loss) improves the quality of syntactic alignment.
#
# Usage:  uv run python src/train.py experiment=ablation/mu_high

experiment_name: ablation_mu_high

model:
  gnn:
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.2
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
