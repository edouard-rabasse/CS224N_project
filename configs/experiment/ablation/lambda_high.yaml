# =============================================================================
# Ablation: Alignment loss weight — high (λ = 0.5)
# =============================================================================
# Tests whether strong alignment pressure improves syntactic probing scores
# at the cost of degraded STS performance (alignment-STS trade-off).
#
# Usage:  uv run python src/train.py experiment=ablation/lambda_high

experiment_name: ablation_lambda_high

model:
  gnn:
    freeze: false
  alignment:
    lambda_align: 0.5
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
