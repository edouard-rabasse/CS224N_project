# =============================================================================
# Experiment: Partial Freeze (Joint Training, top-6 BERT layers trainable)
# =============================================================================
# Strategy: Train BERT and GNN jointly from epoch 0 with all three losses,
# but freeze the first 6 BERT encoder layers (layers 0–5).
# Only the last 6 layers (6–11) + pooler + SimCSE MLP head are trainable.
#
# Rationale: lower layers encode surface/positional features (stable),
# upper layers encode semantics (where syntactic alignment matters most).
#
# Loss: L = L_SimCSE + λ * L_align + μ * L_GNN

experiment_name: partial_freeze

model:
  bert:
    num_unfrozen_layers: 6    # freeze layers 0–5, fine-tune layers 6–11 + pooler
  gnn:
    freeze: false
  alignment:
    lambda_align: 0.1
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 3
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
