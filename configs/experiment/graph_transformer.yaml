# @package _global_
# =============================================================================
# Experiment: Graph Transformer GNN
# =============================================================================
# Replaces GATConv with TransformerConv (full Q/K/V attention over graph
# neighbourhoods). All other hyperparameters match the multi_loss default.
#
# Usage:  uv run python src/train.py experiment=graph_transformer

experiment_name: graph_transformer

model:
  gnn:
    conv_type: gt
    freeze: false
  alignment:
    lambda_align: 0.01
    mu_gnn: 0.05
    stop_grad_gnn: false

training:
  num_train_epochs: 1
  learning_rate: 3.0e-5
  gnn_learning_rate: 1.0e-4
